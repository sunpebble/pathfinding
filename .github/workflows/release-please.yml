name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node

  # Pathfinding uses manual App Store signing on ephemeral macOS runners (automatic + ASC
  # auth fails or falls back to Development profiles). See ExportOptions.plist.
  testflight:
    name: Build & Upload to TestFlight
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: macos-26
    defaults:
      run:
        working-directory: apps/ios/Pathfinding
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Install xcodegen
        run: |
          for tap in $(brew tap); do
            case "$tap" in homebrew/*) ;; *) brew trust "$tap" ;; esac
          done
          brew install xcodegen

      - name: Import distribution certificate
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.DIST_CERT_P12 }}
          p12-password: ${{ secrets.DIST_CERT_PASSWORD }}

      - name: Install App Store provisioning profile
        env:
          PROFILE_APP_BASE64: ${{ secrets.APPLE_PROFILE_APP_BASE64 }}
        run: |
          set -euo pipefail
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          PROFILE_PATH="$PROFILES_DIR/pf_app_store.mobileprovision"
          echo -n "$PROFILE_APP_BASE64" | base64 --decode > "$PROFILE_PATH"
          # Xcode indexes profiles by embedded UUID; filename is arbitrary.
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          cp "$PROFILE_PATH" "$PROFILES_DIR/${PROFILE_UUID}.mobileprovision"
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          APP_ID=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          echo "Installed profile: name=$PROFILE_NAME uuid=$PROFILE_UUID app_id=$APP_ID"
          if [ "$PROFILE_NAME" != "Sunpebble Trips App Store" ]; then
            echo "::error::Provisioning profile Name must be 'Sunpebble Trips App Store' (got '$PROFILE_NAME'). Regenerate in Apple Developer or update PROVISIONING_PROFILE_SPECIFIER in project.yml."
            exit 1
          fi
          case "$APP_ID" in
            *com.sunpebble.trips) ;;
            *)
              echo "::error::Profile application-identifier must end with com.sunpebble.trips (got '$APP_ID')"
              exit 1
              ;;
          esac

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run unit tests (gate)
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; c=[v for rt in d for v in d[rt] if v.get('isAvailable') and v['name'].startswith('iPhone')]; print(c[0]['udid'] if c else '')")
          if [ -z "$UDID" ]; then echo 'no available iPhone simulator'; exit 1; fi
          echo "Using simulator UDID: $UDID"
          xcodebuild test \
            -project Pathfinding.xcodeproj \
            -scheme Pathfinding-Debug \
            -destination "platform=iOS Simulator,id=$UDID" \
            -only-testing:PathfindingTests

      - name: Compute build number (UTC timestamp)
        id: bn
        run: echo "build_number=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

      - name: Read marketing version from package.json
        id: ver
        run: |
          VERSION=$(grep '"version"' "${GITHUB_WORKSPACE}/package.json" | head -1 | sed -E 's/.*"version": "(.+)".*/\1/')
          echo "marketing_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Archive (manual distribution signing)
        run: |
          xcodebuild archive \
            -project Pathfinding.xcodeproj \
            -scheme Pathfinding-Release \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/Pathfinding.xcarchive \
            MARKETING_VERSION=${{ steps.ver.outputs.marketing_version }} \
            CURRENT_PROJECT_VERSION=${{ steps.bn.outputs.build_number }}

      - name: Export IPA
        run: |
          mkdir -p build/ipa
          env PATH="/usr/bin:/bin:/usr/sbin:/sbin" xcodebuild -exportArchive \
            -archivePath build/Pathfinding.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v5
        with:
          app-path: apps/ios/Pathfinding/build/ipa/Pathfinding.ipa
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_API_KEY_P8 }}
          wait-for-processing: 'false'
