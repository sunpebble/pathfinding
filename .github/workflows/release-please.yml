name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node

  testflight:
    name: Build & Upload to TestFlight
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: sunpebble/ci/.github/workflows/ios-testflight.yml@v2
    with:
      working_directory: apps/ios/Pathfinding
      xcode_project: Pathfinding.xcodeproj
      scheme: Pathfinding-Release
      ipa_basename: Pathfinding
      run_xcodegen: true
      build_number_strategy: utc_timestamp
      marketing_version_from_repo_package_json: true
      archive_configuration: Release
      export_subdirectory: ipa
      upload_ipa_path: apps/ios/Pathfinding/build/ipa/Pathfinding.ipa
      run_test_gate: true
      test_scheme: Pathfinding-Debug
      test_only: PathfindingTests
    secrets: inherit