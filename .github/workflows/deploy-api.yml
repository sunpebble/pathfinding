name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - packages/api/**
      - packages/database/**
      - .github/workflows/deploy-api.yml
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:packages
      - name: Build Worker
        working-directory: packages/api
        run: npx flue build --target cloudflare
      - name: Resolve worker dir
        id: w
        working-directory: packages/api
        run: echo "dir=$(find dist -mindepth 1 -maxdepth 1 -type d -print -quit)/" >> "$GITHUB_OUTPUT"
      - name: Apply D1 migrations
        working-directory: packages/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply pathfinding --remote --config ${{ steps.w.outputs.dir }}wrangler.json
      - name: Deploy Worker
        working-directory: packages/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config ${{ steps.w.outputs.dir }}wrangler.json
