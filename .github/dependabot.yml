# Dependabot 每周检查；按生态合并为单个 PR。commit 前缀 chore，避免 release-please 误 bump。
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    groups:
      npm-dependencies:
        patterns:
          - "*"