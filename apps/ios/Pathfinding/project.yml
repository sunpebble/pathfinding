name: Pathfinding
options:
  bundleIdPrefix: org.pathfinding
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false

targets:
  Pathfinding:
    type: application
    platform: iOS
    sources:
      - Pathfinding
    settings:
      base:
        INFOPLIST_FILE: Pathfinding/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: org.pathfinding.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
