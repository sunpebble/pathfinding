name: Pathfinding
options:
  bundleIdPrefix: com.sunpebble
  deploymentTarget:
    iOS: '26.0'
  xcodeVersion: '27.0'
  minimumXcodeGenVersion: '2.0'

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig
  Staging: Config/Staging.xcconfig

configs:
  Debug: debug
  Release: release
  Staging: release

settings:
  base:
    SWIFT_VERSION: '6.0'
    IPHONEOS_DEPLOYMENT_TARGET: '26.0'
    ENABLE_USER_SCRIPT_SANDBOXING: false

targets:
  Pathfinding:
    type: application
    platform: iOS
    sources:
      - path: Pathfinding
        excludes:
          - '**/.DS_Store'
      - path: Shared
        excludes:
          - '**/.DS_Store'
    settings:
      base:
        INFOPLIST_FILE: Pathfinding/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.sunpebble.trips$(BUNDLE_ID_SUFFIX)
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: '1'
        DEVELOPMENT_TEAM: 62HCT6Q83X
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Pathfinding/Pathfinding.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: Sunpebble Trips
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
      Staging: Config/Staging.xcconfig

  PathfindingTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PathfindingTests
    dependencies:
      - target: Pathfinding
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: PathfindingTests
        PRODUCT_MODULE_NAME: PathfindingTests
        PRODUCT_BUNDLE_IDENTIFIER: com.sunpebble.trips.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Pathfinding.app/Pathfinding
        BUNDLE_LOADER: $(TEST_HOST)

  PathfindingUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - PathfindingUITests
    dependencies:
      - target: Pathfinding
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: PathfindingUITests
        PRODUCT_MODULE_NAME: PathfindingUITests
        PRODUCT_BUNDLE_IDENTIFIER: com.sunpebble.trips.uitests
        TEST_TARGET_NAME: Pathfinding

schemes:
  Pathfinding-Debug:
    build:
      targets:
        Pathfinding: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PathfindingTests
        - PathfindingUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  Pathfinding-Release:
    build:
      targets:
        Pathfinding: all
    run:
      config: Release
    test:
      config: Release
      targets:
        - PathfindingTests
        - PathfindingUITests
    profile:
      config: Release
    analyze:
      config: Release
    archive:
      config: Release
