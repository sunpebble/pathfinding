services:
  tidb:
    image: pingcap/tidb:v8.5.0
    ports:
      - '4000:4000' # MySQL protocol port
      - '10080:10080' # TiDB status port
    volumes:
      - tidb-data:/tmp/tidb
    environment:
      - TIDB_ENABLE_TELEMETRY=0
    restart: unless-stopped
    healthcheck:
      test: [CMD, mysqladmin, ping, -h, 127.0.0.1, -P, '4000', -u, root]
      interval: 10s
      timeout: 5s
      retries: 5

  # TODO: apps/api/Dockerfile does not exist yet. Create it before enabling this service.
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '8000:8000'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=mysql://root@tidb:4000/pathfinding
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - 'http://localhost:8000/health'

      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    depends_on:
      tidb:
        condition: service_healthy

  # TODO: apps/crawler/Dockerfile does not exist yet. Create it before enabling this service.
  crawler:
    build:
      context: .
      dockerfile: apps/crawler/Dockerfile
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=mysql://root@tidb:4000/pathfinding
      - AMAP_API_KEY=${AMAP_API_KEY}
      - OVERPASS_API_URL=${OVERPASS_API_URL:-https://overpass-api.de/api/interpreter}
    volumes:
      - crawler-storage:/app/apps/crawler/storage
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - 'http://localhost:3001/health'

      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    depends_on:
      tidb:
        condition: service_healthy

volumes:
  tidb-data:
  crawler-storage:
